<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distribución</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-warning px-4">
    <a href="index.html" class="btn btn-outline-dark btn-sm me-3">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
    <span class="navbar-brand fw-bold text-dark"><i class="bi bi-diagram-3"></i> Distribución Producto-Proveedor</span>
    <button class="btn btn-outline-dark btn-sm ms-auto" onclick="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>Salir
    </button>
  </nav>

  <div class="container py-4">

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-warning fw-bold">
        <i class="bi bi-plus-circle"></i> Asignar Producto a Proveedor
      </div>
      <div class="card-body">
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label">Producto *</label>
            <select id="sel_producto" class="form-select">
              <option value="">-- Selecciona un producto --</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Proveedor *</label>
            <select id="sel_proveedor" class="form-select">
              <option value="">-- Selecciona un proveedor --</option>
            </select>
          </div>
          <div class="col-md-4">
            <label class="form-label">Cantidad Suministrada *</label>
            <input type="number" id="cantidad_suministrada" class="form-control" placeholder="0" min="1">
          </div>
        </div>
        <div id="msg-distribucion" class="mt-2"></div>
        <div class="mt-3">
          <button onclick="asignarDistribucion()" class="btn btn-warning fw-bold">
            <i class="bi bi-link-45deg"></i> Asignar
          </button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white fw-bold">
        <i class="bi bi-table"></i> Distribuciones Registradas
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-warning">
              <tr>
                <th>Producto</th>
                <th>Proveedor</th>
                <th>Cantidad Suministrada</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-distribucion">
              <tr><td colspan="4" class="text-center py-3">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/distribucion.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
