<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proveedores</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-success px-4">
    <a href="index.html" class="btn btn-outline-light btn-sm me-3">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
    <span class="navbar-brand fw-bold"><i class="bi bi-people"></i> Gestión de Proveedores</span>
    <button class="btn btn-outline-light btn-sm ms-auto" onclick="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>Salir
    </button>
  </nav>

  <div class="container py-4">

    <div class="card shadow-sm mb-4">
      <div class="card-header bg-success text-white fw-bold">
        <i class="bi bi-plus-circle"></i> <span id="form-titulo">Nuevo Proveedor</span>
      </div>
      <div class="card-body">
        <input type="hidden" id="id_proveedor">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre del Proveedor *</label>
            <input type="text" id="nombre_proveedor" class="form-control" placeholder="Nombre de la empresa">
          </div>
          <div class="col-md-3">
            <label class="form-label">Teléfono</label>
            <input type="text" id="telefono" class="form-control" placeholder="Ej: 5555-1234">
          </div>
          <div class="col-md-3">
            <label class="form-label">Correo Electrónico</label>
            <input type="email" id="correo_electronico" class="form-control" placeholder="correo@empresa.com">
          </div>
          <div class="col-12">
            <label class="form-label">Dirección</label>
            <input type="text" id="direccion" class="form-control" placeholder="Dirección completa">
          </div>
        </div>
        <div id="msg-proveedor" class="mt-2"></div>
        <div class="mt-3 d-flex gap-2">
          <button onclick="guardarProveedor()" class="btn btn-success">
            <i class="bi bi-save"></i> Guardar
          </button>
          <button onclick="limpiarFormulario()" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
        <span><i class="bi bi-table"></i> Lista de Proveedores</span>
        <button onclick="cargarProveedores()" class="btn btn-outline-success btn-sm">
          <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-success">
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Correo</th>
                <th>Dirección</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-proveedores">
              <tr><td colspan="6" class="text-center py-3">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- auth.js ANTES que proveedores.js -->
  <script src="../js/auth.js"></script>
  <script src="../js/proveedores.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
