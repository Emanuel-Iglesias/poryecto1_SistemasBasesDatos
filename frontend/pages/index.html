<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Gestión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark px-4 py-3">
    <span class="navbar-brand fw-bold fs-4">
      <i class="bi bi-cpu"></i> Sistema de Gestión
    </span>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-2 fw-bold">Panel Principal</h2>
    <p class="text-center mb-5" style="color:rgba(255,255,255,0.5)">Selecciona una sección para comenzar</p>

    <div class="row g-4 justify-content-center">

      <div class="col-md-3">
        <a href="productos.html" class="text-decoration-none">
          <div class="card card-menu shadow-sm text-center p-4">
            <i class="bi bi-archive fs-1 text-info mb-3"></i>
            <h5 class="fw-bold">Productos</h5>
            <p class="small">Agregar, editar y eliminar productos</p>
          </div>
        </a>
      </div>

      <div class="col-md-3">
        <a href="proveedores.html" class="text-decoration-none">
          <div class="card card-menu shadow-sm text-center p-4">
            <i class="bi bi-building fs-1 text-success mb-3"></i>
            <h5 class="fw-bold">Proveedores</h5>
            <p class="small">Gestión de proveedores</p>
          </div>
        </a>
      </div>

      <div class="col-md-3">
        <a href="distribucion.html" class="text-decoration-none">
          <div class="card card-menu shadow-sm text-center p-4">
            <i class="bi bi-shuffle fs-1 text-warning mb-3"></i>
            <h5 class="fw-bold">Distribución</h5>
            <p class="small">Asignar productos a proveedores</p>
          </div>
        </a>
      </div>

      <div class="col-md-3">
        <a href="reportes.html" class="text-decoration-none">
          <div class="card card-menu shadow-sm text-center p-4">
            <i class="bi bi-graph-up-arrow fs-1 text-danger mb-3"></i>
            <h5 class="fw-bold">Reportes</h5>
            <p class="small">Consultas avanzadas y gráficos</p>
          </div>
        </a>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
