<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Salida de Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark px-4 py-3">
    <a href="index.html" class="btn btn-outline-light btn-sm me-3">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
    <span class="navbar-brand fw-bold fs-4">
      <i class="bi bi-arrow-down-circle"></i> Salida de Productos
    </span>
    <div class="d-flex align-items-center gap-3">
      <span style="color:rgba(255,255,255,0.5); font-size:.9rem;" id="nav-usuario"></span>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </button>
    </div>
  </nav>

  <div class="container py-4">

    <div class="row g-4">

      <!-- Formulario -->
      <div class="col-lg-4">
        <div class="card shadow-sm p-4">
          <h5 class="fw-bold mb-3">Registrar Salida</h5>

          <div class="mb-3">
            <label class="form-label">Producto</label>
            <select id="sel-producto" class="form-select">
              <option value="">Seleccionar...</option>
            </select>
          </div>

          <div id="info-stock" class="alert alert-secondary py-2 d-none small">
            Stock disponible: <strong id="stock-actual"></strong> unidades
          </div>

          <div class="mb-3">
            <label class="form-label">Cantidad a retirar</label>
            <input type="number" id="inp-cantidad" class="form-control" min="1" placeholder="0"/>
          </div>

          <div id="alerta-form" class="alert d-none mb-3"></div>

          <button class="btn btn-warning w-100 fw-semibold" onclick="registrarSalida()">
            <i class="bi bi-arrow-down-circle me-1"></i>Registrar Salida
          </button>
        </div>
      </div>

      <!-- Historial -->
      <div class="col-lg-8">
        <div class="card shadow-sm p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h5 class="fw-bold mb-0">Historial de Salidas</h5>
            <button class="btn btn-outline-secondary btn-sm" onclick="cargarSalidas()">
              <i class="bi bi-arrow-clockwise"></i> Actualizar
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover align-middle">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Producto</th>
                  <th>Cantidad</th>
                  <th>Fecha</th>
                  <th>Acción</th>
                </tr>
              </thead>
              <tbody id="tbody-salidas">
                <tr><td colspan="5" class="text-center text-muted">Cargando...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    requireAuth();
    const usr = JSON.parse(localStorage.getItem("usuario") || "{}");
    if (usr.NombreUsuario)
      document.getElementById("nav-usuario").textContent = "Hola, " + usr.NombreUsuario;

    let productos = [];

    async function cargarProductos() {
      const res = await fetch(`${API}/productos`, { headers: authHeaders() });
      productos  = await res.json();
      const sel  = document.getElementById("sel-producto");
      sel.innerHTML = '<option value="">Seleccionar...</option>';
      productos.forEach(p => {
        const opt = document.createElement("option");
        opt.value         = p.id_producto;
        opt.textContent   = `${p.nombre_producto} (stock: ${p.stock})`;
        opt.dataset.stock = p.stock;
        sel.appendChild(opt);
      });
    }

    document.getElementById("sel-producto").addEventListener("change", function () {
      const opt = this.selectedOptions[0];
      if (opt && opt.dataset.stock !== undefined && this.value) {
        document.getElementById("stock-actual").textContent = opt.dataset.stock;
        document.getElementById("info-stock").classList.remove("d-none");
      } else {
        document.getElementById("info-stock").classList.add("d-none");
      }
    });

    async function cargarSalidas() {
      const res   = await fetch(`${API}/salidas`, { headers: authHeaders() });
      const data  = await res.json();
      const tbody = document.getElementById("tbody-salidas");
      if (!Array.isArray(data) || !data.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">Sin registros</td></tr>';
        return;
      }
      tbody.innerHTML = data.map(s => `
        <tr>
          <td>${s.IdSalida}</td>
          <td>${s.nombre_producto}</td>
          <td><span class="badge bg-warning text-dark">${s.Cantidad}</span></td>
          <td>${new Date(s.FechaSalida).toLocaleString("es-GT")}</td>
          <td>
            <button class="btn btn-outline-danger btn-sm" onclick="eliminarSalida(${s.IdSalida})">
              <i class="bi bi-trash"></i>
            </button>
          </td>
        </tr>`).join("");
    }

    function mostrarAlertaForm(msg, tipo = "danger") {
      const el = document.getElementById("alerta-form");
      el.className = "alert alert-" + tipo;
      el.textContent = msg;
      el.classList.remove("d-none");
      setTimeout(() => el.classList.add("d-none"), 5000);
    }

    async function registrarSalida() {
      const IdProducto = document.getElementById("sel-producto").value;
      const Cantidad   = parseInt(document.getElementById("inp-cantidad").value);
      if (!IdProducto || !Cantidad || Cantidad < 1)
        return mostrarAlertaForm("Selecciona un producto e ingresa una cantidad válida.");

      const res  = await fetch(`${API}/salidas`, {
        method:  "POST",
        headers: authHeaders(),
        body:    JSON.stringify({ IdProducto: parseInt(IdProducto), Cantidad })
      });
      const data = await res.json();
      if (!res.ok) return mostrarAlertaForm(data.error);

      mostrarAlertaForm(data.mensaje, "success");
      document.getElementById("inp-cantidad").value = "";
      document.getElementById("sel-producto").value = "";
      document.getElementById("info-stock").classList.add("d-none");
      await cargarProductos();
      await cargarSalidas();
    }

    async function eliminarSalida(id) {
      if (!confirm("¿Eliminar este registro? (El stock NO se revertirá)")) return;
      await fetch(`${API}/salidas/${id}`, { method: "DELETE", headers: authHeaders() });
      cargarSalidas();
    }

    cargarProductos();
    cargarSalidas();
  </script>
</body>
</html>
