<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <link href="../css/styles.css" rel="stylesheet">
</head>
<body>

  <nav class="navbar navbar-dark bg-primary px-4">
    <a href="index.html" class="btn btn-outline-light btn-sm me-3">
      <i class="bi bi-arrow-left"></i> Volver
    </a>
    <span class="navbar-brand fw-bold"><i class="bi bi-box-seam"></i> Gestión de Productos</span>
    <button class="btn btn-outline-light btn-sm ms-auto" onclick="logout()">
      <i class="bi bi-box-arrow-right me-1"></i>Salir
    </button>
  </nav>

  <div class="container py-4">

    <!-- Formulario -->
    <div class="card shadow-sm mb-4">
      <div class="card-header bg-primary text-white fw-bold">
        <i class="bi bi-plus-circle"></i> <span id="form-titulo">Nuevo Producto</span>
      </div>
      <div class="card-body">
        <input type="hidden" id="id_producto">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Nombre del Producto *</label>
            <input type="text" id="nombre_producto" class="form-control" placeholder="Nombre único del producto">
          </div>
          <div class="col-md-3">
            <label class="form-label">Precio *</label>
            <input type="number" id="precio" class="form-control" placeholder="0.00" min="0" step="0.01">
          </div>
          <div class="col-md-3">
            <label class="form-label">Stock *</label>
            <input type="number" id="stock" class="form-control" placeholder="0" min="0">
          </div>
          <div class="col-12">
            <label class="form-label">Descripción</label>
            <textarea id="descripcion" class="form-control" rows="2" placeholder="Descripción opcional"></textarea>
          </div>
        </div>
        <div id="msg-producto" class="mt-2"></div>
        <div class="mt-3 d-flex gap-2">
          <button onclick="guardarProducto()" class="btn btn-primary">
            <i class="bi bi-save"></i> Guardar
          </button>
          <button onclick="limpiarFormulario()" class="btn btn-secondary">
            <i class="bi bi-x-circle"></i> Cancelar
          </button>
        </div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="card shadow-sm">
      <div class="card-header bg-white fw-bold d-flex justify-content-between align-items-center">
        <span><i class="bi bi-table"></i> Lista de Productos</span>
        <button onclick="cargarProductos()" class="btn btn-outline-primary btn-sm">
          <i class="bi bi-arrow-clockwise"></i> Actualizar
        </button>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-primary">
              <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Fecha Ingreso</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tabla-productos">
              <tr><td colspan="7" class="text-center py-3">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- auth.js ANTES que productos.js -->
  <script src="../js/auth.js"></script>
  <script src="../js/productos.js"></script>
  <script>
    requireAuth();
  </script>
</body>
</html>
